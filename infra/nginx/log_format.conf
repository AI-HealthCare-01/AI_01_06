map $request_uri $request_path {
    "~^([^?]*)(\?.*)?$"  $1;
    default               $request_uri;
}

log_format safe '$remote_addr - $remote_user [$time_local] '
                '"$request_method $request_path $server_protocol" '
                '$status $body_bytes_sent '
                '"$http_referer" "$http_user_agent"';
