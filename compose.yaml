services:
  mysql:
    container_name: mysql
    image: mysql:8.4
    restart: always
    env_file: ./infra/env/.local.env
    environment:
      TZ: 'Asia/Seoul'
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Initialize schema and tables
      - ./infra/db/init/Sullivan_Init.sql:/docker-entrypoint-initdb.d/Sullivan_Init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    container_name: redis
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  api:
    container_name: api
    build:
      context: .
      dockerfile: app/Dockerfile
    env_file: ./infra/env/.local.env
    volumes:
      - ./app:/app/app
    ports:
      - "8000:8000"
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    container_name: worker
    build:
      context: .
      dockerfile: ai_worker/Dockerfile
    env_file: ./infra/env/.local.env
    volumes:
      - ./ai_worker:/app/ai_worker
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    container_name: web
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const h=require('http');h.get('http://localhost:3000/',r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    container_name: nginx
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_healthy

volumes:
  db_data:
