services:
  mysql:
    container_name: mysql
    image: mysql:8.4
    restart: always
    env_file: ./infra/env/.prod.env
    environment:
      TZ: 'Asia/Seoul'
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Initialize schema and tables
      - ./infra/db/init/Sullivan_Init.sql:/docker-entrypoint-initdb.d/Sullivan_Init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    container_name: redis
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  api:
    container_name: api
    image: kimth8778/ai-health-api:latest
    build:
      context: .
      dockerfile: app/Dockerfile
    env_file: ./infra/env/.prod.env
    environment:
      TZ: 'Asia/Seoul'
      UPLOAD_DIR: /uploads
    volumes:
      - uploads_data:/uploads
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    container_name: worker
    image: kimth8778/ai-health-worker:latest
    build:
      context: .
      dockerfile: ai_worker/Dockerfile
    env_file: ./infra/env/.prod.env
    environment:
      TZ: 'Asia/Seoul'
      UPLOAD_DIR: /uploads
    volumes:
      - uploads_data:/uploads
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    container_name: web
    image: kimth8778/ai-health-web:latest
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ""
    restart: always
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const h=require('http');h.get('http://localhost:3000/',r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    container_name: nginx
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/log_format.conf:/etc/nginx/conf.d/00-log_format.conf:ro
      - ./infra/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy

volumes:
  db_data:
  uploads_data:
